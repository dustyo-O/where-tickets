name: backend

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Always runs; reports the required `backend` status check on every PR.
  # Detects whether backend-relevant files changed; the heavy `backend-ci` job
  # only runs when they did.
  backend:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'backend/**'
              - 'justfile'
              - '.github/workflows/backend.yml'

  backend-ci:
    needs: backend
    if: needs.backend.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: where_tickets
          POSTGRES_PASSWORD: where_tickets
          POSTGRES_DB: where_tickets
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://where_tickets:where_tickets@localhost:5432/where_tickets
      APP_ENV: local
      PICCOLO_CONF: piccolo_conf
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: extractions/setup-just@v2
      - name: Run backend CI
        run: just ci-backend
