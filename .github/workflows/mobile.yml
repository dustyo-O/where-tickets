name: mobile

on:
  pull_request:
    paths:
      - "mobile/**"
      - "justfile"
      - ".github/workflows/mobile.yml"
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "justfile"
      - ".github/workflows/mobile.yml"

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - uses: extractions/setup-just@v2
      - name: Run mobile CI
        run: just ci-mobile
