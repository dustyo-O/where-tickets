name: meta

on:
  pull_request:
  push:
    branches: [main]

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - name: justfile parses
        run: just --summary
      - name: Root files look sane
        run: |
          set -euo pipefail
          test -f README.md
          test -f justfile
          test -d backend
          test -d mobile
          test -d infra
          test -d corpus
          test -d context
      - name: README links resolve
        run: |
          set -euo pipefail
          # Extract relative markdown links from README.md and check they exist.
          missing=0
          while IFS= read -r link; do
            # Strip leading ./ and trailing /
            path="${link%/}"
            path="${path#./}"
            if [ ! -e "$path" ]; then
              echo "Missing README link target: $link"
              missing=1
            fi
          done < <(grep -oE '\]\(([^)#]+)\)' README.md | sed -E 's/^\]\(([^)]+)\)$/\1/' | grep -vE '^(https?:|mailto:)')
          exit $missing
